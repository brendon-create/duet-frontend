<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工後台 - DUET 訂單管理</title>
    <link rel="stylesheet" href="assets/css/landing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        
        .nav {
            padding: 20px 40px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #d4af37;
        }
        
        .logo-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }
        
        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        
        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: #d4af37;
        }
        
        .main-content {
            padding: 120px 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #d4af37;
        }
        
        .page-subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #d4af37;
        }
        
        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }
        
        .stat-card.pending .stat-number { color: #ffa500; }
        .stat-card.paid .stat-number { color: #4CAF50; }
        .stat-card.processing .stat-number { color: #2196F3; }
        .stat-card.completed .stat-number { color: #9C27B0; }
        .stat-card.shipped .stat-number { color: #00BCD4; }
        
        .orders-table-container {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .orders-table th {
            background: rgba(212, 175, 55, 0.1);
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #d4af37;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .orders-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }
        
        .orders-table tr:hover {
            background: rgba(212, 175, 55, 0.05);
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.pending {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
        }
        
        .status-badge.paid {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        
        .status-badge.processing {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
        }
        
        .status-badge.completed {
            background: rgba(156, 39, 176, 0.2);
            color: #9C27B0;
        }
        
        .status-badge.shipped {
            background: rgba(0, 188, 212, 0.2);
            color: #00BCD4;
        }
        
        .status-badge.delivered {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* Order Detail Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: #1a1a1a;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #d4af37;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        .detail-section {
            margin-bottom: 24px;
        }
        
        .detail-section h3 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .detail-label {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .detail-value {
            color: #fff;
            font-weight: 500;
        }
        
        .status-select {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .item-letters {
            font-size: 24px;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 8px;
        }
        
        .item-details {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .logistics-section {
            background: rgba(0, 188, 212, 0.1);
            border: 1px solid rgba(0, 188, 212, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .logistics-timeline {
            margin-top: 12px;
        }
        
        .logistics-event {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            border-left: 2px solid rgba(0, 188, 212, 0.3);
            padding-left: 16px;
            margin-left: 8px;
        }
        
        .logistics-event:last-child {
            border-left-color: transparent;
        }
        
        .logistics-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            min-width: 120px;
        }
        
        .logistics-status {
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-bar input {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
        }
        
        .filter-bar select {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .main-content {
                padding: 100px 20px 40px;
            }
            
            .orders-table-container {
                overflow-x: auto;
            }
            
            .orders-table {
                min-width: 800px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-text">DUET</span>
                <span class="logo-subtitle">BCAG JEWELRY</span>
            </div>
            <div class="nav-links">
                <a href="admin.html" class="active">訂單管理</a>
                <a href="index.html">返回前台</a>
            </div>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">訂單管理</h1>
                <p class="page-subtitle">管理客戶訂單、追蹤製作進度與物流狀態</p>
            </div>
            <button class="btn btn-primary" onclick="loadOrders()">
                重新整理
            </button>
        </div>
        
        <div class="stats-row" id="statsRow">
            <div class="stat-card pending">
                <div class="stat-number" id="countPending">0</div>
                <div class="stat-label">待付款</div>
            </div>
            <div class="stat-card paid">
                <div class="stat-number" id="countPaid">0</div>
                <div class="stat-label">已付款</div>
            </div>
            <div class="stat-card processing">
                <div class="stat-number" id="countProcessing">0</div>
                <div class="stat-label">製作中</div>
            </div>
            <div class="stat-card completed">
                <div class="stat-number" id="countCompleted">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card shipped">
                <div class="stat-number" id="countShipped">0</div>
                <div class="stat-label">已出貨</div>
            </div>
        </div>
        
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="搜尋訂單編號或客戶名稱..." oninput="filterOrders()">
            <select id="statusFilter" onchange="filterOrders()">
                <option value="">全部狀態</option>
                <option value="pending">待付款</option>
                <option value="paid">已付款</option>
                <option value="processing">製作中</option>
                <option value="completed">已完成</option>
                <option value="shipped">已出貨</option>
                <option value="delivered">已簽收</option>
            </select>
        </div>
        
        <div class="orders-table-container">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>訂單編號</th>
                        <th>客戶</th>
                        <th>商品</th>
                        <th>金額</th>
                        <th>狀態</th>
                        <th>日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="7" class="loading">載入中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Order Detail Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">訂單詳情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            
            <div id="orderDetailContent">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>
    
    <script>
        // API Base URL
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000' 
            : '';
        
        // 管理員 API Key（請修改為安全的密碼並設定環境變數 ADMIN_API_KEY）
        const ADMIN_API_KEY = 'duet-admin-2024';
        
        let allOrders = [];
        
        // Status mapping
        const statusMap = {
            'pending': { text: '待付款', class: 'pending' },
            'paid': { text: '已付款', class: 'paid' },
            'processing': { text: '製作中', class: 'processing' },
            'completed': { text: '已完成', class: 'completed' },
            'shipped': { text: '已出貨', class: 'shipped' },
            'delivered': { text: '已簽收', class: 'delivered' }
        };
        
        // Load orders on page load
        document.addEventListener('DOMContentLoaded', loadOrders);
        
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/orders`, {
                    headers: { 'X-Admin-Key': ADMIN_API_KEY }
                });
                const data = await response.json();
                
                if (data.success) {
                    allOrders = data.orders;
                    updateStats();
                    renderOrders(allOrders);
                } else {
                    document.getElementById('ordersTableBody').innerHTML = 
                        `<tr><td colspan="7" class="empty-state">載入失敗: ${data.error}</td></tr>`;
                }
            } catch (error) {
                console.error('載入訂單失敗:', error);
                document.getElementById('ordersTableBody').innerHTML = 
                    `<tr><td colspan="7" class="empty-state">網路錯誤，請稍後重試</td></tr>`;
            }
        }
        
        function updateStats() {
            const counts = {
                pending: 0,
                paid: 0,
                processing: 0,
                completed: 0,
                shipped: 0
            };
            
            allOrders.forEach(order => {
                const status = order.status;
                if (counts[status] !== undefined) {
                    counts[status]++;
                }
            });
            
            document.getElementById('countPending').textContent = counts.pending;
            document.getElementById('countPaid').textContent = counts.paid;
            document.getElementById('countProcessing').textContent = counts.processing;
            document.getElementById('countCompleted').textContent = counts.completed;
            document.getElementById('countShipped').textContent = counts.shipped;
        }
        
        function renderOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            
            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-state">尚無訂單</td></tr>`;
                return;
            }
            
            tbody.innerHTML = orders.map(order => {
                const userInfo = order.userInfo || {};
                const items = order.items || [];
                const itemNames = items.map(item => item.letter1 + item.letter2).join(', ') || '-';
                const total = order.total || 0;
                const statusInfo = statusMap[order.status] || { text: order.status, class: '' };
                const date = order.timestamp ? new Date(order.timestamp).toLocaleDateString('zh-TW') : '-';
                
                return `
                    <tr>
                        <td><strong>${order.orderId}</strong></td>
                        <td>${userInfo.name || '-'}<br><small style="color:rgba(255,255,255,0.5)">${userInfo.email || '-'}</small></td>
                        <td>${itemNames}</td>
                        <td>NT$ ${total.toLocaleString()}</td>
                        <td><span class="status-badge ${statusInfo.class}">${statusInfo.text}</span></td>
                        <td>${date}</td>
                        <td>
                            <button class="btn btn-secondary btn-sm" onclick="viewOrder('${order.orderId}')">查看</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function filterOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            
            const filtered = allOrders.filter(order => {
                const matchSearch = !search || 
                    order.orderId.toLowerCase().includes(search) ||
                    (order.userInfo?.name || '').toLowerCase().includes(search) ||
                    (order.userInfo?.email || '').toLowerCase().includes(search);
                
                const matchStatus = !status || order.status === status;
                
                return matchSearch && matchStatus;
            });
            
            renderOrders(filtered);
        }
        
        async function viewOrder(orderId) {
            try {
                const response = await fetch(`${API_BASE}/api/order/${orderId}`, {
                    headers: { 'X-Admin-Key': ADMIN_API_KEY }
                });
                const data = await response.json();
                
                if (data.success) {
                    showOrderModal(data.order);
                } else {
                    alert('載入訂單失敗: ' + data.error);
                }
            } catch (error) {
                console.error('載入訂單失敗:', error);
                alert('網路錯誤，請稍後重試');
            }
        }
        
        function showOrderModal(order) {
            const userInfo = order.userInfo || {};
            const items = order.items || [];
            const statusInfo = statusMap[order.status] || { text: order.status, class: '' };
            
            let content = `
                <div class="detail-section">
                    <h3>基本資訊</h3>
                    <div class="detail-row">
                        <span class="detail-label">訂單編號</span>
                        <span class="detail-value">${order.orderId}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">狀態</span>
                        <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">建立日期</span>
                        <span class="detail-value">${order.timestamp ? new Date(order.timestamp).toLocaleString('zh-TW') : '-'}</span>
                    </div>
                    ${order.statusUpdatedAt ? `
                    <div class="detail-row">
                        <span class="detail-label">狀態更新日期</span>
                        <span class="detail-value">${new Date(order.statusUpdatedAt).toLocaleString('zh-TW')}</span>
                    </div>
                    ` : ''}
                </div>
                
                <div class="detail-section">
                    <h3>客戶資訊</h3>
                    <div class="detail-row">
                        <span class="detail-label">姓名</span>
                        <span class="detail-value">${userInfo.name || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email</span>
                        <span class="detail-value">${userInfo.email || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">電話</span>
                        <span class="detail-value">${userInfo.phone || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">地址</span>
                        <span class="detail-value">${userInfo.address || '-'}</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>訂單內容</h3>
                    ${items.map(item => `
                        <div class="item-card">
                            <div class="item-letters">${item.letter1} + ${item.letter2}</div>
                            <div class="item-details">
                                字體: ${item.font1} / ${item.font2} | 
                                尺寸: ${item.size}mm | 
                                材質: ${item.material} | 
                                鍍膜: ${item.plating} | 
                                表面: ${item.finish}
                            </div>
                        </div>
                    `).join('')}
                    <div class="detail-row">
                        <span class="detail-label">總金額</span>
                        <span class="detail-value" style="color: #d4af37; font-size: 18px;">
                            NT$ ${(order.total || 0).toLocaleString()}
                        </span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>更新狀態</h3>
                    <div class="form-group">
                        <label>訂單狀態</label>
                        <select id="newStatus" class="status-select" onchange="showLogisticsFields()">
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>待付款</option>
                            <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>已付款</option>
                            <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>製作中</option>
                            <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>已完成</option>
                            <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>已出貨</option>
                            <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>已簽收</option>
                        </select>
                    </div>
                    
                    <div id="logisticsFields" style="display: ${order.status === 'shipped' || order.status === 'delivered' ? 'block' : 'none'}">
                        <div class="form-group">
                            <label>物流方式</label>
                            <select id="logisticsType">
                                <option value="tcat" ${order.logistics === 'tcat' ? 'selected' : ''}>黑貓宅急便</option>
                                <option value="7-11" ${order.logistics === '7-11' ? 'selected' : ''}>7-11 店到店</option>
                                <option value="post" ${order.logistics === 'post' ? 'selected' : ''}>郵局包裹</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>貨運編號</label>
                            <input type="text" id="trackingNumber" value="${order.trackingNumber || ''}" placeholder="輸入貨運追蹤號碼">
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" style="width: 100%; margin-top: 16px;" 
                        onclick="updateOrderStatus('${order.orderId}')">
                        更新狀態
                    </button>
                </div>
            `;
            
            // Add logistics tracking section if shipped
            if (order.status === 'shipped' || order.status === 'delivered') {
                content += `
                    <div class="logistics-section">
                        <h3>物流資訊</h3>
                        <div class="detail-row">
                            <span class="detail-label">物流方式</span>
                            <span class="detail-value">
                                ${order.logistics === 'tcat' ? '黑貓宅急便' : 
                                  order.logistics === '7-11' ? '7-11 店到店' : 
                                  order.logistics === 'post' ? '郵局包裹' : order.logistics || '-'}
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">貨運編號</span>
                            <span class="detail-value">${order.trackingNumber || '-'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">出貨日期</span>
                            <span class="detail-value">${order.shippedAt ? new Date(order.shippedAt).toLocaleString('zh-TW') : '-'}</span>
                        </div>
                        ${order.deliveredAt ? `
                        <div class="detail-row">
                            <span class="detail-label">簽收日期</span>
                            <span class="detail-value">${new Date(order.deliveredAt).toLocaleString('zh-TW')}</span>
                        </div>
                        ` : ''}
                        
                        <button class="btn btn-secondary btn-sm" style="margin-top: 12px;" 
                            onclick="trackLogistics('${order.logistics}', '${order.trackingNumber}')">
                            追蹤物流
                        </button>
                        
                        <div id="logisticsTimeline"></div>
                    </div>
                `;
            }
            
            document.getElementById('orderDetailContent').innerHTML = content;
            document.getElementById('orderModal').classList.add('active');
        }
        
        function showLogisticsFields() {
            const status = document.getElementById('newStatus').value;
            const logisticsFields = document.getElementById('logisticsFields');
            logisticsFields.style.display = (status === 'shipped' || status === 'delivered') ? 'block' : 'none';
        }
        
        async function updateOrderStatus(orderId) {
            const newStatus = document.getElementById('newStatus').value;
            const trackingNumber = document.getElementById('trackingNumber')?.value || '';
            const logistics = document.getElementById('logisticsType')?.value || '';
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/order/${orderId}/status`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Key': ADMIN_API_KEY
                    },
                    body: JSON.stringify({
                        status: newStatus,
                        trackingNumber: trackingNumber,
                        logistics: logistics
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('狀態更新成功！');
                    closeModal();
                    loadOrders();
                } else {
                    alert('更新失敗: ' + data.error);
                }
            } catch (error) {
                console.error('更新狀態失敗:', error);
                alert('網路錯誤，請稍後重試');
            }
        }
        
        async function trackLogistics(logisticsType, trackingNumber) {
            if (!trackingNumber) {
                alert('請先輸入貨運編號');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/logistics/${logisticsType}/${trackingNumber}`, {
                    headers: { 'X-Admin-Key': ADMIN_API_KEY }
                });
                const data = await response.json();
                
                if (data.success) {
                    const tracking = data.tracking;
                    let timelineHtml = '<div class="logistics-timeline">';
                    
                    tracking.events.forEach(event => {
                        timelineHtml += `
                            <div class="logistics-event">
                                <span class="logistics-time">${new Date(event.time).toLocaleString('zh-TW')}</span>
                                <span class="logistics-status">${event.status} - ${event.location}</span>
                            </div>
                        `;
                    });
                    
                    timelineHtml += '</div>';
                    document.getElementById('logisticsTimeline').innerHTML = timelineHtml;
                } else {
                    alert('追蹤失敗: ' + data.error);
                }
            } catch (error) {
                console.error('物流追蹤失敗:', error);
                alert('網路錯誤，請稍後重試');
            }
        }
        
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }
        
        // Close modal on overlay click
        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
