<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工後台 - DUET 訂單管理</title>
    <link rel="stylesheet" href="assets/css/landing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-light: #e0e0e0;
            --text-muted: #888;
            --border: rgba(212, 175, 55, 0.2);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
        }
        
        /* Login Screen */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }
        
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .login-form input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .login-form button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .login-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
        }
        
        .login-error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        
        /* Main App */
        #mainApp { display: none; }
        
        .nav {
            padding: 16px 32px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--primary);
        }
        
        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .nav-user span {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .nav-user .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .main-content {
            padding: 100px 24px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        
        .tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .tab:hover { color: var(--text-light); }
        
        .tab.active {
            background: var(--primary);
            color: #000;
        }
        
        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Filter */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-bar input, .filter-bar select {
            background: #2a2a2a;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .filter-bar input { flex: 1; min-width: 180px; }
        
        /* Table */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: rgba(212, 175, 55, 0.1);
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        tr:hover { background: rgba(212, 175, 55, 0.03); }
        
        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-badge.pending { background: rgba(255,165,0,0.2); color: #ffa500; }
        .status-badge.paid { background: rgba(76,175,80,0.2); color: #4CAF50; }
        .status-badge.processing { background: rgba(33,150,243,0.2); color: #2196F3; }
        .status-badge.completed { background: rgba(156,39,176,0.2); color: #9C27B0; }
        .status-badge.shipped { background: rgba(0,188,212,0.2); color: #00BCD4; }
        .status-badge.delivered { background: rgba(212,175,55,0.2); color: var(--primary); }
        
        /* Buttons */
        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-sm { padding: 6px 10px; font-size: 11px; }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--primary);
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
        }
        
        /* Detail Sections */
        .detail-section { margin-bottom: 20px; }
        
        .detail-section h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        
        .detail-label { color: var(--text-muted); }
        .detail-value { color: var(--text-light); }
        
        /* Forms */
        .form-group { margin-bottom: 14px; }
        
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            background: #2a2a2a;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        /* User Management */
        .user-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-info { margin-top: 12px; }
        .user-name { font-weight: 600; margin-bottom: 4px; }
        .user-meta { font-size: 12px; color: var(--text-muted); }
        
        /* Logs */
        .log-item {
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .log-user { color: var(--primary); }
        .log-time { color: var(--text-muted); }
        .log-action { font-size: 13px; }
        
        /* Loading & Empty */
        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .main-content { padding: 80px 16px 24px; }
            .nav { padding: 12px 16px; }
            .table-container { overflow-x: auto; }
            table { min-width: 700px; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-logo">DUET</div>
            <p class="login-subtitle">員工後台登入</p>
            <form class="login-form" onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="帳號" required>
                <input type="password" id="password" placeholder="密碼" required>
                <button type="submit">登入</button>
            </form>
            <p class="login-error" id="loginError"></p>
            <p style="margin-top: 24px; font-size: 12px; color: var(--text-muted);">
                預設帳號: admin / admin123
            </p>
        </div>
    </div>
    
    <!-- Main App -->
    <div id="mainApp">
        <nav class="nav">
            <div class="nav-container">
                <div class="nav-logo">DUET 後台</div>
                <div class="nav-user">
                    <span id="currentUser"></span>
                    <button class="btn-logout" onclick="handleLogout()">登出</button>
                </div>
            </div>
        </nav>
        
        <div class="main-content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('orders')">訂單管理</button>
                <button class="tab" onclick="switchTab('users')">員工管理</button>
            </div>
            
            <!-- Orders Tab -->
            <div id="ordersTab">
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-number" id="countPending">0</div><div class="stat-label">待付款</div></div>
                    <div class="stat-card"><div class="stat-number" id="countPaid">0</div><div class="stat-label">已付款</div></div>
                    <div class="stat-card"><div class="stat-number" id="countProcessing">0</div><div class="stat-label">製作中</div></div>
                    <div class="stat-card"><div class="stat-number" id="countCompleted">0</div><div class="stat-label">已完成</div></div>
                    <div class="stat-card"><div class="stat-number" id="countShipped">0</div><div class="stat-label">已出貨</div></div>
                </div>
                
                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="搜尋訂單編號或客戶..." oninput="filterOrders()">
                    <select id="statusFilter" onchange="filterOrders()">
                        <option value="">全部狀態</option>
                        <option value="pending">待付款</option>
                        <option value="paid">已付款</option>
                        <option value="processing">製作中</option>
                        <option value="completed">已完成</option>
                        <option value="shipped">已出貨</option>
                        <option value="delivered">已簽收</option>
                    </select>
                    <button class="btn btn-secondary" onclick="loadOrders()">重新整理</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>訂單編號</th>
                                <th>客戶</th>
                                <th>商品</th>
                                <th>金額</th>
                                <th>狀態</th>
                                <th>日期</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr><td colspan="7" class="loading">載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Users Tab -->
            <div id="usersTab" style="display: none;">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="showAddUserModal()">+ 新增員工</button>
                </div>
                <div id="usersList">
                    <div class="loading">載入中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Order Detail Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">訂單詳情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="orderDetailContent"></div>
        </div>
    </div>
    
    <!-- Add User Modal -->
    <div class="modal-overlay" id="addUserModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">新增員工</h2>
                <button class="modal-close" onclick="closeAddUserModal()">&times;</button>
            </div>
            <form onsubmit="handleAddUser(event)">
                <div class="form-group">
                    <label>帳號</label>
                    <input type="text" id="newUsername" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="newName" required>
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="newPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">建立帳號</button>
            </form>
        </div>
    </div>
    
    <script>
        // 後端 URL 配置
        const API_BASE = 'https://duet-backend-wlw8.onrender.com';
        
        // State
        let currentUser = null;
        let allOrders = [];
        
        // Status mapping
        const statusMap = {
            'pending': { text: '待付款', class: 'pending' },
            'paid': { text: '已付款', class: 'paid' },
            'processing': { text: '製作中', class: 'processing' },
            'completed': { text: '已完成', class: 'completed' },
            'shipped': { text: '已出貨', class: 'shipped' },
            'delivered': { text: '已簽收', class: 'delivered' },
            'test': { text: '測試訂單', class: 'pending' }
        };
        
        // Check login on load
        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('adminUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainApp();
            }
        });
        
        // Login
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    currentUser = data.user;
                    localStorage.setItem('adminUser', JSON.stringify(currentUser));
                    showMainApp();
                } else {
                    errorEl.textContent = data.error || '登入失敗';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = '網路錯誤，請稍後重試';
                errorEl.style.display = 'block';
            }
        }
        
        function handleLogout() {
            localStorage.removeItem('adminUser');
            currentUser = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
        
        function showMainApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('currentUser').textContent = currentUser.name || currentUser.username;
            loadOrders();
        }
        
        // Tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('ordersTab').style.display = tab === 'orders' ? 'block' : 'none';
            document.getElementById('usersTab').style.display = tab === 'users' ? 'block' : 'none';
            
            if (tab === 'users') loadUsers();
        }
        
        // Orders
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/orders`, {
                    headers: { 'X-Admin-Key': 'duet-admin-2024' }
                });
                const data = await response.json();
                
                if (data.success) {
                    allOrders = data.orders;
                    updateStats();
                    renderOrders(allOrders);
                }
            } catch (err) {
                document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="7" class="loading">載入失敗</td></tr>';
            }
        }
        
        function updateStats() {
            const counts = { pending: 0, paid: 0, processing: 0, completed: 0, shipped: 0 };
            allOrders.forEach(o => { if (counts[o.status] !== undefined) counts[o.status]++; });
            document.getElementById('countPending').textContent = counts.pending;
            document.getElementById('countPaid').textContent = counts.paid;
            document.getElementById('countProcessing').textContent = counts.processing;
            document.getElementById('countCompleted').textContent = counts.completed;
            document.getElementById('countShipped').textContent = counts.shipped;
        }
        
        function renderOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            if (!orders.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">尚無訂單</td></tr>';
                return;
            }
            tbody.innerHTML = orders.map(order => {
                const u = order.userInfo || {};
                const items = order.items || [];
                const total = order.total || 0;
                const status = statusMap[order.status] || { text: order.status, class: '' };
                const date = order.timestamp ? new Date(order.timestamp).toLocaleDateString('zh-TW') : '-';
                
                return `<tr>
                    <td><strong>${order.orderId}</strong></td>
                    <td>${u.name || '-'}<br><small style="color:var(--text-muted)">${u.email || '-'}</small></td>
                    <td>${items.map(i => i.letter1 + i.letter2).join(', ') || '-'}</td>
                    <td>NT$ ${total.toLocaleString()}</td>
                    <td><span class="status-badge ${status.class}">${status.text}</span></td>
                    <td>${date}</td>
                    <td><button class="btn btn-secondary btn-sm" onclick="viewOrder('${order.orderId}')">查看</button></td>
                </tr>`;
            }).join('');
        }
        
        function filterOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const filtered = allOrders.filter(o => {
                const matchSearch = !search || o.orderId.toLowerCase().includes(search) ||
                    (o.userInfo?.name || '').toLowerCase().includes(search);
                const matchStatus = !status || o.status === status;
                return matchSearch && matchStatus;
            });
            renderOrders(filtered);
        }
        
        // Order Detail
        async function viewOrder(orderId) {
            try {
                const response = await fetch(`${API_BASE}/api/order/${orderId}`, {
                    headers: { 'X-Admin-Key': 'duet-admin-2024' }
                });
                const data = await response.json();
                if (data.success) showOrderModal(data.order);
            } catch (err) { alert('載入失敗'); }
        }
        
        function showOrderModal(order) {
            const u = order.userInfo || {};
            const items = order.items || [];
            const status = statusMap[order.status] || { text: order.status, class: '' };
            
            let content = `
                <div class="detail-section">
                    <h3>基本資訊</h3>
                    <div class="detail-row"><span class="detail-label">訂單編號</span><span class="detail-value">${order.orderId}</span></div>
                    <div class="detail-row"><span class="detail-label">狀態</span><span class="status-badge ${status.class}">${status.text}</span></div>
                    <div class="detail-row"><span class="detail-label">建立日期</span><span class="detail-value">${order.timestamp ? new Date(order.timestamp).toLocaleString('zh-TW') : '-'}</span></div>
                </div>
                <div class="detail-section">
                    <h3>客戶資訊</h3>
                    <div class="detail-row"><span class="detail-label">姓名</span><span class="detail-value">${u.name || '-'}</span></div>
                    <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${u.email || '-'}</span></div>
                    <div class="detail-row"><span class="detail-label">電話</span><span class="detail-value">${u.phone || '-'}</span></div>
                    <div class="detail-row"><span class="detail-label">地址</span><span class="detail-value">${u.address || '-'}</span></div>
                </div>
                <div class="detail-section">
                    <h3>訂單內容</h3>
                    ${items.map(item => `<div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:6px;margin-bottom:8px;">
                        <div style="font-size:18px;color:var(--primary);font-weight:600;margin-bottom:4px;">${item.letter1} + ${item.letter2}</div>
                        <div style="font-size:12px;color:var(--text-muted)">字體: ${item.font1}/${item.font2} | 尺寸: ${item.size}mm | 材質: ${item.material} | 鍍膜: ${item.plating} | 表面: ${item.finish}</div>
                    </div>`).join('')}
                    <div class="detail-row"><span class="detail-label">總金額</span><span class="detail-value" style="color:var(--primary);font-size:16px;">NT$ ${(order.total||0).toLocaleString()}</span></div>
                </div>
                <div class="detail-section">
                    <h3>更新狀態</h3>
                    <div class="form-group">
                        <select id="newStatus" onchange="showLogisticsFields()">
                            <option value="pending" ${order.status==='pending'?'selected':''}>待付款</option>
                            <option value="paid" ${order.status==='paid'?'selected':''}>已付款</option>
                            <option value="processing" ${order.status==='processing'?'selected':''}>製作中</option>
                            <option value="completed" ${order.status==='completed'?'selected':''}>已完成</option>
                            <option value="shipped" ${order.status==='shipped'?'selected':''}>已出貨</option>
                            <option value="delivered" ${order.status==='delivered'?'selected':''}>已簽收</option>
                        </select>
                    </div>
                    <div id="logisticsFields" style="display:${order.status==='shipped'||order.status==='delivered'?'block':'none'}">
                        <div class="form-group">
                            <select id="logisticsType">
                                <option value="tcat" ${order.logistics==='tcat'?'selected':''}>黑貓宅急便</option>
                                <option value="7-11" ${order.logistics==='7-11'?'selected':''}>7-11店到店</option>
                                <option value="post" ${order.logistics==='post'?'selected':''}>郵局包裹</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="text" id="trackingNumber" value="${order.trackingNumber||''}" placeholder="貨運編號">
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="updateOrderStatus('${order.orderId}')">更新狀態</button>
                </div>`;
            
            document.getElementById('orderDetailContent').innerHTML = content;
            document.getElementById('orderModal').classList.add('active');
            
            // Load logs
            loadOrderLogs(order.orderId);
        }
        
        async function loadOrderLogs(orderId) {
            try {
                const res = await fetch(`${API_BASE}/api/admin/order/${orderId}/logs`, {
                    headers: { 'X-Admin-Key': 'duet-admin-2024' }
                });
                const data = await res.json();
                if (data.success && data.logs.length) {
                    const logsHtml = data.logs.map(log => `<div class="log-item">
                        <div class="log-header"><span class="log-user">${log.admin_user}</span><span class="log-time">${new Date(log.created_at).toLocaleString('zh-TW')}</span></div>
                        <div class="log-action">${log.action}: ${log.old_status} → ${log.new_status}</div>
                    </div>`).join('');
                    document.getElementById('orderDetailContent').innerHTML += `<div class="detail-section"><h3>操作日誌</h3>${logsHtml}</div>`;
                }
            } catch (e) { console.log('無日誌'); }
        }
        
        function showLogisticsFields() {
            const status = document.getElementById('newStatus').value;
            document.getElementById('logisticsFields').style.display = (status === 'shipped' || status === 'delivered') ? 'block' : 'none';
        }
        
        async function updateOrderStatus(orderId) {
            const newStatus = document.getElementById('newStatus').value;
            const tracking = document.getElementById('trackingNumber')?.value || '';
            const logistics = document.getElementById('logisticsType')?.value || '';
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/order/${orderId}/status`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Key': 'duet-admin-2024',
                        'X-Admin-User': currentUser.username
                    },
                    body: JSON.stringify({ status: newStatus, trackingNumber: tracking, logistics })
                });
                const data = await res.json();
                if (data.success) {
                    alert('更新成功！');
                    closeModal();
                    loadOrders();
                } else {
                    alert('更新失敗: ' + data.error);
                }
            } catch (err) { alert('網路錯誤'); }
        }
        
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }
        
        // Users
        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/users`, {
                    headers: { 'X-Admin-Key': 'duet-admin-2024' }
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('usersList').innerHTML = data.users.map(u => `<div class="user-card">
                        <div class="user-info">
                            <div class="user-name">${u.name || u.username}</div>
                            <div class="user-meta">${u.username} | 建立於 ${new Date(u.created_at).toLocaleDateString('zh-TW')}</div>
                        </div>
                        ${u.username !== 'admin' ? `<button class="btn btn-secondary btn-sm" onclick="deleteUser(${u.id})">刪除</button>` : ''}
                    </div>`).join('');
                }
            } catch (err) { document.getElementById('usersList').innerHTML = '<div class="loading">載入失敗</div>'; }
        }
        
        function showAddUserModal() {
            document.getElementById('addUserModal').classList.add('active');
        }
        
        function closeAddUserModal() {
            document.getElementById('addUserModal').classList.remove('active');
        }
        
        async function handleAddUser(e) {
            e.preventDefault();
            const username = document.getElementById('newUsername').value;
            const name = document.getElementById('newName').value;
            const password = document.getElementById('newPassword').value;
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/users`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Key': 'duet-admin-2024'
                    },
                    body: JSON.stringify({ username, name, password })
                });
                const data = await res.json();
                if (data.success) {
                    alert('建立成功！');
                    closeAddUserModal();
                    loadUsers();
                } else {
                    alert(data.error || '建立失敗');
                }
            } catch (err) { alert('網路錯誤'); }
        }
        
        async function deleteUser(userId) {
            if (!confirm('確定要刪除此員工帳號嗎？')) return;
            try {
                const res = await fetch(`${API_BASE}/api/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Key': 'duet-admin-2024' }
                });
                const data = await res.json();
                if (data.success) {
                    alert('刪除成功');
                    loadUsers();
                } else {
                    alert(data.error || '刪除失敗');
                }
            } catch (err) { alert('網路錯誤'); }
        }
    </script>
</body>
</html>
