<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢 - DUET</title>
    <!-- 不使用 landing.css，避免樣式衝突 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --bg-dark: #f8f8f8;
            --bg-card: #fff;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --border: #e0e0e0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
        }
        
        /* Navigation */
        .nav {
            padding: 16px 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .logo-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }
        
        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Hero */
        .hero {
            padding: 120px 24px 40px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .hero p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        /* Tab Navigation */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #fff;
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: #000;
        }
        
        /* Search Panels */
        .search-panel {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .search-panel.active {
            display: block;
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            font-family: 'Outfit', sans-serif;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            width: 100%;
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: #fafafa;
        }
        
        /* Verification Code Section */
        .verify-section {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .verify-section.active {
            display: block;
        }
        
        .code-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }
        
        .code-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid var(--border);
            border-radius: 8px;
            letter-spacing: 4px;
        }
        
        .code-input:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .timer {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 12px;
        }
        
        .timer.expired {
            color: #e74c3c;
        }
        
        /* Message Box */
        .message-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: none;
        }
        
        .message-box.show {
            display: block;
        }
        
        .message-box.error {
            border-color: #e74c3c;
            background: #fdf2f2;
        }
        
        .message-box.success {
            border-color: #27ae60;
            background: #f2fdf5;
        }
        
        .message-box svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
        }
        
        .message-box p {
            color: var(--text-dark);
            font-size: 14px;
        }
        
        /* Order Result */
        .order-result {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .order-result.show {
            display: block;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .order-id {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.pending { background: #fef3c7; color: #d97706; }
        .status-badge.paid { background: #dbeafe; color: #2563eb; }
        .status-badge.processing { background: #e0e7ff; color: #4338ca; }
        .status-badge.completed { background: #d1fae5; color: #059669; }
        .status-badge.shipped { background: #fce7f3; color: #db2777; }
        .status-badge.delivered { background: #d1fae5; color: #059669; }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .detail-label {
            color: var(--text-muted);
            font-size: 13px;
        }
        
        .detail-value {
            color: var(--text-dark);
            font-size: 13px;
            font-weight: 500;
            text-align: right;
        }
        
        .item-card {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .item-letters {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .item-details {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-weight: 600;
        }
        
        .total-amount {
            font-size: 18px;
            color: var(--primary);
        }
        
        .logistics-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .logistics-info h4 {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .logistics-info p {
            font-size: 13px;
            color: var(--text-dark);
        }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .loading.show {
            display: block;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .hero { padding: 100px 16px 30px; }
            .hero h1 { font-size: 24px; }
            .search-panel { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <div style="display:flex;align-items:baseline;gap:8px;">
                <span class="logo-text">DUET</span>
                <span class="logo-subtitle">BCAG JEWELRY</span>
            </div>
            <div class="nav-links">
                <a href="index.html">首頁</a>
            </div>
        </div>
    </nav>
    
    <div class="hero">
        <h1>訂單查詢</h1>
        <p>輸入您的訂單資訊查詢訂單狀態</p>
        
        <!-- 分頁切換 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('orderId')">訂單編號查詢</button>
            <button class="tab-btn" onclick="switchTab('email')">姓名/E-mail查詢</button>
        </div>
        
        <!-- 訂單編號查詢 -->
        <div id="orderIdPanel" class="search-panel active">
            <div class="form-group">
                <label>訂單編號</label>
                <input type="text" id="orderInput" placeholder="請輸入訂單編號 (例如: DUET2024...)" />
            </div>
            <button class="btn-primary" onclick="searchByOrderId()">查詢訂單</button>
        </div>
        
        <!-- Email 驗證查詢 -->
        <div id="emailPanel" class="search-panel">
            <!-- Step 1: 輸入姓名+Email -->
            <div id="emailStep1">
                <div class="form-group">
                    <label>訂購人姓名</label>
                    <input type="text" id="nameInput" placeholder="請輸入訂購時的姓名" />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="emailInput" placeholder="請輸入訂購時的 Email" />
                </div>
                <button class="btn-primary" onclick="sendVerificationCode()" id="sendCodeBtn">發送驗證碼</button>
            </div>
            
            <!-- Step 2: 輸入驗證碼 -->
            <div id="emailStep2" class="verify-section">
                <p style="font-size: 14px; color: var(--text-muted);">
                    驗證碼已發送到您的 Email，請輸入驗證碼
                </p>
                <div class="code-inputs">
                    <input type="text" class="code-input" maxlength="1" id="code1" oninput="handleCodeInput(this, 'code2')" onkeydown="handleCodeKeydown(event, 'code1')">
                    <input type="text" class="code-input" maxlength="1" id="code2" oninput="handleCodeInput(this, 'code3')" onkeydown="handleCodeKeydown(event, 'code1')">
                    <input type="text" class="code-input" maxlength="1" id="code3" oninput="handleCodeInput(this, 'code4')" onkeydown="handleCodeKeydown(event, 'code2')">
                    <input type="text" class="code-input" maxlength="1" id="code4" oninput="handleCodeInput(this, 'code5')" onkeydown="handleCodeKeydown(event, 'code3')">
                    <input type="text" class="code-input" maxlength="1" id="code5" oninput="handleCodeInput(this, 'code6')" onkeydown="handleCodeKeydown(event, 'code4')">
                    <input type="text" class="code-input" maxlength="1" id="code6" onkeydown="handleCodeKeydown(event, 'code5')">
                </div>
                <button class="btn-primary" onclick="verifyCode()" id="verifyBtn">驗證並查詢</button>
                <div class="timer" id="timer">驗證碼有效期：<span id="countdown">120</span> 秒</div>
                <button class="btn-secondary" style="margin-top: 12px;" onclick="resetEmailVerify()">重新輸入</button>
            </div>
        </div>
        
        <div id="loading" class="loading">查詢中...</div>
        
        <!-- 訊息顯示 -->
        <div id="messageBox" class="message-box">
            <p id="messageText"></p>
        </div>
        
        <!-- 訂單結果 -->
        <div id="orderResult" class="order-result">
            <!-- Order details will be inserted here -->
        </div>
    </div>
    
    <script>
        // ==========================================
        // 環境持久化設定（優先順序：URL > localStorage > 預設）
        // ==========================================
        const PRODUCTION_BACKEND_URL = 'https://duet-backend-wlw8.onrender.com';
        const STAGING_BACKEND_URL = 'https://duet-backend-staging-wlw8.onrender.com';
        const ENV_STORAGE_KEY = 'duet_deploy_env';

        function getCurrentEnv() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlEnv = urlParams.get('env');
            if (urlEnv === 'staging' || urlEnv === 'production') {
                localStorage.setItem(ENV_STORAGE_KEY, urlEnv);
                return urlEnv;
            }
            const storedEnv = localStorage.getItem(ENV_STORAGE_KEY);
            if (storedEnv === 'staging' || storedEnv === 'production') {
                return storedEnv;
            }
            return 'production';
        }

        const currentEnv = getCurrentEnv();
        const API_BASE = currentEnv === 'staging' ? STAGING_BACKEND_URL : PRODUCTION_BACKEND_URL;
        window.CURRENT_ENV = currentEnv;
        
        const statusMap = {
            'pending': { text: '待付款', class: 'pending' },
            'paid': { text: '已付款', class: 'paid' },
            'processing': { text: '製作中', class: 'processing' },
            'completed': { text: '已完成', class: 'completed' },
            'shipped': { text: '已出貨', class: 'shipped' },
            'delivered': { text: '已簽收', class: 'delivered' }
        };
        
        let countdownInterval = null;
        let currentEmail = '';
        
        // 分頁切換
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.search-panel').forEach(panel => panel.classList.remove('active'));
            
            if (tab === 'orderId') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.remove('active');
                document.getElementById('orderIdPanel').classList.add('active');
                document.getElementById('emailPanel').classList.remove('active');
            } else {
                document.querySelectorAll('.tab-btn')[0].classList.remove('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('orderIdPanel').classList.remove('active');
                document.getElementById('emailPanel').classList.add('active');
            }
            
            hideMessage();
            document.getElementById('orderResult').classList.remove('show');
        }
        
        // 訂單編號查詢
        async function searchByOrderId() {
            const orderId = document.getElementById('orderInput').value.trim();
            if (!orderId) {
                showMessage('請輸入訂單編號', 'error');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/api/order/${orderId}`);
                const data = await response.json();
                
                hideLoading();
                
                if (data.success) {
                    showOrder(data.order);
                } else {
                    showMessage('查無此訂單，請確認訂單編號是否正確', 'error');
                }
            } catch (error) {
                hideLoading();
                showMessage('查詢失敗，請稍後再試', 'error');
            }
        }
        
        // 發送驗證碼
        async function sendVerificationCode() {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            
            if (!name) {
                showMessage('請輸入姓名', 'error');
                return;
            }
            
            if (!email || !email.includes('@')) {
                showMessage('請輸入有效的 Email', 'error');
                return;
            }
            
            currentEmail = email;
            document.getElementById('sendCodeBtn').disabled = true;
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/api/order/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });
                const data = await response.json();
                
                hideLoading();
                
                if (data.success) {
                    document.getElementById('emailStep1').style.display = 'none';
                    document.getElementById('emailStep2').classList.add('active');
                    startCountdown(120);
                } else {
                    showMessage(data.error || '發送失敗，請稍後再試', 'error');
                    document.getElementById('sendCodeBtn').disabled = false;
                }
            } catch (error) {
                hideLoading();
                showMessage('發送失敗，請稍後再試', 'error');
                document.getElementById('sendCodeBtn').disabled = false;
            }
        }
        
        // 驗證碼輸入處理
        function handleCodeInput(current, nextId) {
            if (current.value.length === 1 && nextId) {
                document.getElementById(nextId).focus();
            }
        }
        
        function handleCodeKeydown(event, prevId) {
            if (event.key === 'Backspace' && event.target.value.length === 0) {
                document.getElementById(prevId).focus();
            }
        }
        
        // 倒數計時
        function startCountdown(seconds) {
            let remaining = seconds;
            const countdownEl = document.getElementById('countdown');
            const timerEl = document.getElementById('timer');
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                remaining--;
                countdownEl.textContent = remaining;
                
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    timerEl.classList.add('expired');
                    timerEl.innerHTML = '驗證碼已過期，請重新發送';
                    document.getElementById('verifyBtn').disabled = true;
                }
            }, 1000);
        }
        
        // 驗證驗證碼
        async function verifyCode() {
            const code = 
                document.getElementById('code1').value +
                document.getElementById('code2').value +
                document.getElementById('code3').value +
                document.getElementById('code4').value +
                document.getElementById('code5').value +
                document.getElementById('code6').value;
            
            if (code.length !== 6) {
                showMessage('請輸入完整的6位驗證碼', 'error');
                return;
            }
            
            document.getElementById('verifyBtn').disabled = true;
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/api/order/verify-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, code })
                });
                const data = await response.json();
                
                hideLoading();
                
                if (data.success) {
                    if (data.orders && data.orders.length > 0) {
                        // 顯示多筆訂單
                        showMultipleOrders(data.orders);
                    } else {
                        showMessage('找不到該 Email 的訂單記錄', 'error');
                        document.getElementById('verifyBtn').disabled = false;
                    }
                } else {
                    showMessage(data.error || '驗證失敗', 'error');
                    document.getElementById('verifyBtn').disabled = false;
                }
            } catch (error) {
                hideLoading();
                showMessage('驗證失敗，請稍後再試', 'error');
                document.getElementById('verifyBtn').disabled = false;
            }
        }
        
        // 重設 Email 驗證
        function resetEmailVerify() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            document.getElementById('emailStep1').style.display = 'block';
            document.getElementById('emailStep2').classList.remove('active');
            document.getElementById('nameInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('code1').value = '';
            document.getElementById('code2').value = '';
            document.getElementById('code3').value = '';
            document.getElementById('code4').value = '';
            document.getElementById('code5').value = '';
            document.getElementById('code6').value = '';
            document.getElementById('sendCodeBtn').disabled = false;
            document.getElementById('verifyBtn').disabled = false;
            document.getElementById('timer').innerHTML = '驗證碼有效期：<span id="countdown">120</span> 秒';
            document.getElementById('timer').classList.remove('expired');
            currentEmail = '';
        }
        
        // 顯示單筆訂單
        function showOrder(order) {
            const u = order.userInfo || {};
            const items = order.items || [];
            const status = statusMap[order.status] || { text: order.status, class: '' };
            
            let html = `
                <div class="result-header">
                    <div class="order-id">${order.orderId}</div>
                    <span class="status-badge ${status.class}">${status.text}</span>
                </div>
                
                <div class="detail-section">
                    <h3>訂單資訊</h3>
                    <div class="detail-row">
                        <span class="detail-label">訂單日期</span>
                        <span class="detail-value">${order.timestamp ? new Date(order.timestamp).toLocaleString('zh-TW') : '-'}</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>收件資訊</h3>
                    <div class="detail-row">
                        <span class="detail-label">姓名</span>
                        <span class="detail-value">${u.name || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">電話</span>
                        <span class="detail-value">${u.phone || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">地址</span>
                        <span class="detail-value">${u.address || '-'}</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>訂單內容</h3>
                    ${items.map(item => `
                        <div class="item-card">
                            <div class="item-letters">${item.letter1} + ${item.letter2}</div>
                            <div class="item-details">
                                字體: ${item.font1} / ${item.font2}<br>
                                尺寸: ${item.size}mm<br>
                                材質: ${item.material} | 鍍膜: ${item.plating}<br>
                                表面處理: ${item.finish}
                            </div>
                        </div>
                    `).join('')}
                    
                    <div class="total-row">
                        <span>總金額</span>
                        <span class="total-amount">NT$ ${(order.total || 0).toLocaleString()}</span>
                    </div>
                </div>
            `;
            
            // Add logistics info if shipped
            if (order.status === 'shipped' || order.status === 'delivered') {
                const logisticsName = {
                    'tcat': '黑貓宅急便',
                    '7-11': '7-11 店到店',
                    'post': '郵局包裹'
                };
                
                html += `
                    <div class="logistics-info">
                        <h4>物流資訊</h4>
                        <p>物流方式：${logisticsName[order.logistics] || order.logistics || '-'}</p>
                        <p>追蹤號碼：${order.trackingNumber || '-'}</p>
                    </div>
                `;
            }
            
            document.getElementById('orderResult').innerHTML = html;
            document.getElementById('orderResult').classList.add('show');
            hideMessage();
        }
        
        // 顯示多筆訂單
        function showMultipleOrders(orders) {
            if (orders.length === 1) {
                showOrder(orders[0]);
                return;
            }
            
            let html = `<h3 style="margin-bottom: 16px;">找到 ${orders.length} 筆訂單</h3>`;
            
            orders.forEach((order, index) => {
                const status = statusMap[order.status] || { text: order.status, class: '' };
                html += `
                    <div class="item-card" style="cursor: pointer;" onclick="showOrderDetail('${order.orderId}')">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div class="item-letters">${order.orderId}</div>
                            <span class="status-badge ${status.class}">${status.text}</span>
                        </div>
                        <div class="item-details" style="margin-top:8px;">
                            日期：${order.timestamp ? new Date(order.timestamp).toLocaleDateString('zh-TW') : '-'} | 
                            金額：NT$ ${(order.total || 0).toLocaleString()}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('orderResult').innerHTML = html;
            document.getElementById('orderResult').classList.add('show');
            hideMessage();
        }
        
        // 顯示單筆訂單詳情（從多筆列表點擊）
        async function showOrderDetail(orderId) {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/api/order/${orderId}`);
                const data = await response.json();
                hideLoading();
                if (data.success) {
                    showOrder(data.order);
                }
            } catch (error) {
                hideLoading();
            }
        }
        
        // 顯示訊息
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            const textEl = document.getElementById('messageText');
            box.className = 'message-box show ' + type;
            textEl.textContent = text;
            document.getElementById('orderResult').classList.remove('show');
        }
        
        // 隱藏訊息
        function hideMessage() {
            document.getElementById('messageBox').classList.remove('show');
        }
        
        // 顯示載入中
        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }
        
        // 隱藏載入中
        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }
        
        // Enter key to search
        document.getElementById('orderInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchByOrderId();
        });
        
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendVerificationCode();
        });
    </script>
</body>
</html>
