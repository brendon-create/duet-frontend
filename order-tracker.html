<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢 - DUET</title>
    <link rel="stylesheet" href="assets/css/landing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --primary-dark: #b8962e;
            --bg-dark: #f8f8f8;
            --bg-card: #fff;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --border: #e0e0e0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
        }
        
        /* Navigation */
        .nav {
            padding: 16px 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .logo-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }
        
        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Hero */
        .hero {
            padding: 120px 24px 40px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .hero p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        /* Search */
        .search-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 12px;
            transition: border-color 0.3s;
            pointer-events: auto !important;
            background: #fff !important;
            color: #000 !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
            border-radius: 8px !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .search-box input::placeholder {
            color: #999;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .search-box button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .search-box button:hover {
            transform: translateY(-1px);
        }
        
        /* Order Result */
        .order-result {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        
        .order-result.show { display: block; }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .order-id {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-badge.pending { background: #fff3e0; color: #f57c00; }
        .status-badge.paid { background: #e8f5e9; color: #43a047; }
        .status-badge.processing { background: #e3f2fd; color: #1976d2; }
        .status-badge.completed { background: #f3e5f5; color: #7b1fa2; }
        .status-badge.shipped { background: #e0f7fa; color: #00acc1; }
        .status-badge.delivered { background: #fff8e1; color: #ffa000; }
        
        /* Detail Section */
        .detail-section {
            margin-bottom: 16px;
        }
        
        .detail-section h3 {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 500; }
        
        /* Item Card */
        .item-card {
            background: #fafafa;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
        }
        
        .item-letters {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
        }
        
        .item-details {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }
        
        /* Total */
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 600;
            border-top: 2px solid var(--border);
            margin-top: 12px;
        }
        
        .total-amount {
            color: var(--primary);
            font-size: 20px;
        }
        
        /* Logistics */
        .logistics-info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 14px;
            margin-top: 16px;
        }
        
        .logistics-info h4 {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .logistics-info p {
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        /* Empty/Error */
        .message-box {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .message-box svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .hero { padding: 100px 16px 30px; }
            .hero h1 { font-size: 24px; }
            .search-box, .order-result { padding: 20px; }
            .result-header { flex-direction: column; gap: 8px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <div style="display:flex;align-items:baseline;gap:8px;">
                <span class="logo-text">DUET</span>
                <span class="logo-subtitle">BCAG JEWELRY</span>
            </div>
            <div class="nav-links">
                <a href="index.html">首頁</a>
            </div>
        </div>
    </nav>
    
    <div class="hero">
        <h1>訂單查詢</h1>
        <p>輸入您的訂單編號查詢訂單狀態</p>
        
        <div class="search-box">
            <input type="text" id="orderInput" placeholder="請輸入訂單編號 (例如: DUET2024...)" />
            <button onclick="searchOrder()">查詢訂單</button>
        </div>
        
        <div id="loading" class="loading" style="display:none;">查詢中...</div>
        
        <div id="orderResult" class="order-result">
            <!-- Order details will be inserted here -->
        </div>
        
        <div id="notFound" class="message-box" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 8v4M12 16h.01"/>
            </svg>
            <p>查無此訂單，請確認訂單編號是否正確</p>
        </div>
    </div>
    
    <script>
        // 後端 URL 配置
        const API_BASE = 'https://duet-backend-wlw8.onrender.com';
        
        const statusMap = {
            'pending': { text: '待付款', class: 'pending' },
            'paid': { text: '已付款', class: 'paid' },
            'processing': { text: '製作中', class: 'processing' },
            'completed': { text: '已完成', class: 'completed' },
            'shipped': { text: '已出貨', class: 'shipped' },
            'delivered': { text: '已簽收', class: 'delivered' }
        };
        
        // Enter key to search
        document.getElementById('orderInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchOrder();
        });
        
        async function searchOrder() {
            const orderId = document.getElementById('orderInput').value.trim();
            if (!orderId) return;
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('orderResult').classList.remove('show');
            document.getElementById('notFound').style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/api/order/${orderId}`);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (data.success) {
                    showOrder(data.order);
                } else {
                    document.getElementById('notFound').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('notFound').style.display = 'block';
            }
        }
        
        function showOrder(order) {
            const u = order.userInfo || {};
            const items = order.items || [];
            const status = statusMap[order.status] || { text: order.status, class: '' };
            
            let html = `
                <div class="result-header">
                    <div class="order-id">${order.orderId}</div>
                    <span class="status-badge ${status.class}">${status.text}</span>
                </div>
                
                <div class="detail-section">
                    <h3>訂單資訊</h3>
                    <div class="detail-row">
                        <span class="detail-label">訂單日期</span>
                        <span class="detail-value">${order.timestamp ? new Date(order.timestamp).toLocaleString('zh-TW') : '-'}</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>收件資訊</h3>
                    <div class="detail-row">
                        <span class="detail-label">姓名</span>
                        <span class="detail-value">${u.name || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">電話</span>
                        <span class="detail-value">${u.phone || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">地址</span>
                        <span class="detail-value">${u.address || '-'}</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>訂單內容</h3>
                    ${items.map(item => `
                        <div class="item-card">
                            <div class="item-letters">${item.letter1} + ${item.letter2}</div>
                            <div class="item-details">
                                字體: ${item.font1} / ${item.font2}<br>
                                尺寸: ${item.size}mm<br>
                                材質: ${item.material} | 鍍膜: ${item.plating}<br>
                                表面處理: ${item.finish}
                            </div>
                        </div>
                    `).join('')}
                    
                    <div class="total-row">
                        <span>總金額</span>
                        <span class="total-amount">NT$ ${(order.total || 0).toLocaleString()}</span>
                    </div>
                </div>
            `;
            
            // Add logistics info if shipped
            if (order.status === 'shipped' || order.status === 'delivered') {
                const logisticsName = {
                    'tcat': '黑貓宅急便',
                    '7-11': '7-11 店到店',
                    'post': '郵局包裹'
                }[order.logistics] || order.logistics;
                
                html += `
                    <div class="logistics-info">
                        <h4>📦 物流資訊</h4>
                        <p><strong>物流方式：</strong>${logisticsName || '-'}</p>
                        <p><strong>貨運編號：</strong>${order.trackingNumber || '-'}</p>
                        ${order.shippedAt ? `<p><strong>出貨日期：</strong>${new Date(order.shippedAt).toLocaleString('zh-TW')}</p>` : ''}
                        ${order.deliveredAt ? `<p><strong>簽收日期：</strong>${new Date(order.deliveredAt).toLocaleString('zh-TW')}</p>` : ''}
                    </div>
                `;
            }
            
            document.getElementById('orderResult').innerHTML = html;
            document.getElementById('orderResult').classList.add('show');
        }
    </script>
</body>
</html>
