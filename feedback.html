<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUET - 購買回饋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #d4af37;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: 4px;
        }
        
        .header p {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
            letter-spacing: 2px;
        }
        
        .order-id {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .order-id label {
            font-size: 13px;
            color: #888;
            display: block;
            margin-bottom: 5px;
        }
        
        .order-id span {
            font-size: 20px;
            color: #333;
            font-weight: 600;
        }
        
        .rating-section {
            margin-bottom: 30px;
        }
        
        .rating-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .stars {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .star {
            font-size: 40px;
            cursor: pointer;
            color: #ddd;
            transition: all 0.2s ease;
        }
        
        .star:hover,
        .star.active {
            color: #d4af37;
            transform: scale(1.1);
        }
        
        .star.selected {
            color: #d4af37;
        }
        
        .comment-section {
            margin-bottom: 30px;
        }
        
        .comment-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .comment-section textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: 'Outfit', 'Microsoft JhengHei', Arial, sans-serif;
            font-size: 15px;
            resize: vertical;
            transition: border-color 0.2s ease;
        }
        
        .comment-section textarea:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .success-message {
            text-align: center;
            padding: 40px;
        }
        
        .success-message .checkmark {
            font-size: 60px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        .success-message h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .success-message p {
            color: #666;
            font-size: 16px;
        }
        
        .thank-you-link {
            display: inline-block;
            margin-top: 30px;
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
        }
        
        .thank-you-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container" id="feedbackForm">
        <div class="header">
            <h1>DUET</h1>
            <p>BCAG JEWELRY</p>
        </div>
        
        <div class="order-id">
            <label>訂單編號</label>
            <span id="orderIdDisplay">載入中...</span>
        </div>
        
        <div class="rating-section">
            <h2>請給予評分</h2>
            <div class="stars">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
        </div>
        
        <div class="comment-section">
            <h2>建議回饋（選填）</h2>
            <textarea id="commentInput" placeholder="您對我們的產品或服務有任何建議嗎？"></textarea>
        </div>
        
        <button class="btn-submit" id="submitBtn" onclick="submitFeedback()">提交回饋</button>
    </div>
    
    <div class="container" id="successMessage" style="display: none;">
        <div class="success-message">
            <div class="checkmark">✓</div>
            <h2>感謝您的回饋！</h2>
            <p>您寶貴的意見是我們進步的動力</p>
            <a href="https://duet.brendonchen.com" class="thank-you-link">← 回到 DUET 首頁</a>
        </div>
    </div>

    <script>
        // 取得 URL 參數
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order') || '';
        
        // 顯示訂單編號
        document.getElementById('orderIdDisplay').textContent = orderId || '未指定';
        
        let selectedRating = 0;
        
        // 星星點擊事件
        const stars = document.querySelectorAll('.star');
        stars.forEach(star => {
            star.addEventListener('click', function() {
                selectedRating = parseInt(this.dataset.value);
                updateStars();
            });
            
            star.addEventListener('mouseover', function() {
                const value = parseInt(this.dataset.value);
                highlightStars(value);
            });
            
            star.addEventListener('mouseout', function() {
                updateStars();
            });
        });
        
        function highlightStars(maxValue) {
            stars.forEach((star, index) => {
                if (index < maxValue) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }
        
        function updateStars() {
            stars.forEach((star, index) => {
                if (index < selectedRating) {
                    star.classList.add('selected');
                } else {
                    star.classList.remove('selected');
                }
            });
        }
        
        // 提交回饋
        async function submitFeedback() {
            if (selectedRating === 0) {
                alert('請選擇評分');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                const response = await fetch(window.BACKEND_URL + '/api/feedback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        orderId: orderId,
                        rating: selectedRating,
                        comment: document.getElementById('commentInput').value
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('feedbackForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    alert(data.error || '提交失敗，請稍後重試');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提交回饋';
                }
            } catch (error) {
                console.error('提交錯誤:', error);
                alert('網路錯誤，請稍後重試');
                submitBtn.disabled = false;
                submitBtn.textContent = '提交回饋';
            }
        }
        
        // 配置 BACKEND_URL
        window.BACKEND_URL = 'https://duet.brendonchen.com';
    </script>
</body>
</html>
