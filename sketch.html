<!DOCTYPE html>
<html>
<head>
    <title>DUET Sketch Shader Test</title>
    <style>
        body { margin: 0; background: #e0e0e0; overflow: hidden; }
        #paper-texture {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
            opacity: 0.3;
            pointer-events: none;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: serif;
            color: #333;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="paper-texture"></div>
    <div id="info">
        <h1>DUET Sketch Mode Lab</h1>
        <p>滑鼠拖動旋轉，觀察陰影處的鉛筆排線效果</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec3 vNormal;
        varying vec2 vUv;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vNormal;
        varying vec2 vUv;
        
        void main() {
            // 設定虛擬光源方向
            vec3 lightDir = normalize(vec3(0.5, 1.0, 0.5));
            float dProd = dot(vNormal, lightDir);
            
            // 基礎紙張顏色
            vec3 paperColor = vec3(0.95, 0.95, 0.92);
            vec3 pencilColor = vec3(0.2, 0.2, 0.2);
            
            // 建立排線紋理 (使用螢幕座標讓線條固定)
            float line1 = step(0.5, fract((gl_FragCoord.x + gl_FragCoord.y) * 0.2));
            float line2 = step(0.5, fract((gl_FragCoord.x - gl_FragCoord.y) * 0.15));
            float line3 = step(0.5, fract(gl_FragCoord.y * 0.3));
            
            vec3 color = paperColor;

            // 根據光影強度決定排線密度 (非真實感渲染核心)
            if (dProd < 0.8) {
                color = mix(pencilColor, color, 0.8 + 0.2 * line1);
            }
            if (dProd < 0.5) {
                color = mix(pencilColor, color, 0.7 + 0.3 * line2);
            }
            if (dProd < 0.2) {
                color = mix(pencilColor, color, 0.6 + 0.4 * line3);
            }
            if (dProd < 0.0) {
                color = mix(pencilColor, color, 0.4); // 極暗處
            }

            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        let scene, camera, renderer, cube, edges;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. 建立正方體
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            
            // 2. 建立素描 Shader 材質
            const sketchMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent
            });

            cube = new THREE.Mesh(geometry, sketchMaterial);
            scene.add(cube);

            // 3. 加入黑色輪廓線 (EdgesGeometry)
            const edgeGeo = new THREE.EdgesGeometry(geometry);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
            edges = new THREE.LineSegments(edgeGeo, edgeMat);
            cube.add(edges);

            camera.position.z = 5;

            // 簡易旋轉控制
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            
            document.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                    cube.rotation.y += deltaMove.x * 0.01;
                    cube.rotation.x += deltaMove.y * 0.01;
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // 讓方塊自動微微轉動展現動態排線
            if(!isDragging) {
                cube.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
