<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>925 Silver - The Perfect Choreography</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Noto Serif TC", serif; }
        
        /* 背景交由 CSS 與 GSAP 控制 */
        body { 
            background-color: #000;
            background-image: url('Toscana.png');
            background-size: cover;
            /* 起始位置：精準鎖定在圖片最頂部（窗外夜景） */
            background-position: center 0%; 
            background-repeat: no-repeat;
            background-attachment: fixed; 
            min-height: 2500vh; 
            overflow-x: hidden; 
            color: white; 
        }
        
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; pointer-events: none; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; letter-spacing: 4px; font-size: 0.8rem; }

        .liquid-glass {
            position: fixed; 
            top: 0; 
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            z-index: 10; 
            opacity: 0; 
            pointer-events: none;
            width: 18vw; /* 縮小卡片寬度，避免重疊 */
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #card-intro { top: 50%; right: 10%; transform: translateY(-50%); width: 35vw; opacity: 1; }

        /* 流程卡片均勻散佈 */
        #step-0 { left: 5%; }
        #step-1 { left: 19%; }
        #step-2 { left: 33%; }
        #step-3 { left: 47%; }
        #step-4 { left: 61%; }
        #step-5 { left: 75%; }

        h1 { font-size: 1.4rem; margin-bottom: 10px; line-height: 1.3; color: #fff; }
        p { font-size: 0.85rem; line-height: 1.6; opacity: 0.7; }
        .step-num { font-size: 2.2rem; font-weight: bold; opacity: 0.1; position: absolute; top: 5px; right: 12px; }
    </style>
</head>
<body>

    <div id="loader">CRAFTING YOUR STORY...</div>

    <div id="card-intro" class="liquid-glass">
        <h1 style="font-size: 2rem;">每一個交織，<br>都是一段故事的開始</h1>
        <p>兩個字母，承載著你們的故事。<br>透過 AI 對話，我們為你打造獨一無二的交織墜飾。</p>
    </div>

    <div id="step-0" class="journey-card liquid-glass"><h1>你的專屬設計旅程</h1><p>從對話到實體，只需 5-7 個工作天</p></div>
    <div id="step-1" class="journey-card liquid-glass"><div class="step-num">01</div><h1>AI 對話諮詢</h1><p>透過溫暖對話分享故事，AI 設計師會仔細聆聽意義。</p></div>
    <div id="step-2" class="journey-card liquid-glass"><div class="step-num">02</div><h1>選擇字型組合</h1><p>推薦最適合字型，也可自由探索 100+ 種精選字體。</p></div>
    <div id="step-3" class="journey-card liquid-glass"><div class="step-num">03</div><h1>即時 3D 預覽</h1><p>在瀏覽器中 360° 旋轉細節，直到完全滿意。</p></div>
    <div id="step-4" class="journey-card liquid-glass"><div class="step-num">04</div><h1>安全付款下單</h1><p>透過綠界金流保障交易，付款後立即開始製作。</p></div>
    <div id="step-5" class="journey-card liquid-glass"><h1>收到專屬作品</h1><p>收到精緻作品與設計理念卡片，完整傳達心意。</p></div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        let scene, camera, renderer, modelA, modelB, wrapperA, wrapperB;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(4, -3, 10);
            camera.rotation.set(0.25, 0.4, 0); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const manager = new THREE.LoadingManager(() => {
                document.getElementById('loader').style.display = 'none';
                setupAnimations();
            });

            new THREE.RGBELoader(manager).load('https://raw.githubusercontent.com/brendon-create/duet-frontend/main/assets/images/hdr/jewelry_box_r2.hdr', (t) => {
                t.mapping = THREE.EquirectangularReflectionMapping;
                scene.environment = t;
            });

            const gltfLoader = new THREE.GLTFLoader(manager);
            const dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            gltfLoader.setDRACOLoader(dracoLoader);

            gltfLoader.load('A.glb', (gltf) => {
                modelA = gltf.scene;
                wrapperA = new THREE.Group();
                setupModel(modelA, wrapperA, -6);
                scene.add(wrapperA);
            });

            gltfLoader.load('B.glb', (gltf) => {
                modelB = gltf.scene;
                wrapperB = new THREE.Group();
                setupModel(modelB, wrapperB, 15); // 起始在右側畫面外
                wrapperB.scale.set(7.5, 7.5, 7.5);   // 起始尺寸縮小一半（原 15）
                wrapperB.visible = false;
                scene.add(wrapperB);
            });

            animate();
        }

        function setupModel(model, wrapper, xPos) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            const scale = 5.2 / size.y;
            model.scale.set(scale, scale, scale);
            model.position.sub(center); 
            wrapper.add(model);
            wrapper.position.set(xPos, 0, 0);
            model.traverse(c => { if (c.isMesh) { c.material.metalness = 1.0; c.material.roughness = 0.05; }});
        }

        function setupAnimations() {
            gsap.registerPlugin(ScrollTrigger);
            
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "body",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.2
                }
            });

            // =========================================================
            // 【時間軸總長度計算：1.25】確保所有動畫嚴格對齊此總時間
            // =========================================================

            // 1. 背景完美平移：從窗外（上方）移到桌面（下）
            // 起始位置設為 -50%，讓一開始先看到窗外景色（而非已經看到部分桌面）
            tl.fromTo("body", 
                { backgroundPosition: "center -50%" }, 
                { backgroundPosition: "center 100%", ease: "none", duration: 1.25 }, 0);

            // 2. A 的謝幕 (0.0 -> 0.3) - 一邊移動一邊旋轉
            tl.to("#card-intro", { y: "-150vh", opacity: 0, ease: "none", duration: 0.3 }, 0);
            tl.to(camera.position, { z: 7, ease: "none", duration: 0.3 }, 0);
            // A 一邊往後移動 (z:25) 一邊旋轉 45 度
            tl.to(wrapperA.rotation, { y: Math.PI * 0.25, ease: "power1.out", duration: 0.3 }, 0); 
            tl.to(wrapperA.position, { z: 25, ease: "none", duration: 0.3 }, 0);
            tl.set(wrapperA, { visible: false }, 0.3);

            // =========================================================
            // 3. B 的兩段式魔法進場
            // =========================================================
            tl.set(wrapperB, { visible: true }, 0.25); 

            // 【段落一：快速閃避 (0.25 -> 0.45)】從右側滑入，並且「快速」縮小讓出版面
            // 調整最終位置：根據桌面背景微調（稍微往下移，落在桌面區域）
            tl.fromTo(wrapperB.position, 
                { x: 15, z: -5 }, 
                { x: 0, y: -0.3, z: 0.5, ease: "power2.out", duration: 0.2 }, 0.25);
            
            tl.fromTo(wrapperB.scale, 
                { x: 7.5, y: 7.5, z: 7.5 }, 
                { x: 1.25, y: 1.25, z: 1.25, ease: "power2.out", duration: 0.2 }, 0.25); // 極速縮到 1.25 倍（原 2.5）
            
            tl.fromTo(modelB.rotation, 
                { y: 0 }, 
                { y: Math.PI * 0.25, ease: "power1.inOut", duration: 0.2 }, 0.25); // 初步旋轉到 45 度角

            // 【段落二：安靜沉澱 (0.45 -> 1.25)】字卡流動期間，極其緩慢地縮小到桌上的 10% 大小
            // 最終設定為 0.035 倍（尺寸縮小一半）
            tl.to(wrapperB.scale, 
                { x: 0.035, y: 0.035, z: 0.035, ease: "none", duration: 0.8 }, 0.45); 
            
            // 位置繼續緩慢沉降，落在桌面中央
            tl.to(wrapperB.position, 
                { y: -0.5, z: 0.8, ease: "none", duration: 0.8 }, 0.45);
            
            // 最終旋轉角度：從 45 度繼續緩慢轉到 90 度 (Hero 視角)
            tl.to(modelB.rotation, 
                { y: Math.PI * 0.5, ease: "none", duration: 0.8 }, 0.45);

            // =========================================================
            // 4. 字卡的音階流動 (0.35 -> 1.25)
            // =========================================================
            const cards = gsap.utils.toArray(".journey-card");
            cards.forEach((card, i) => {
                // 卡片依序在 0.35, 0.45, 0.55... 啟動
                const start = 0.35 + (i * 0.1); 
                
                // 浮現
                tl.fromTo(card, 
                    { y: "100vh", opacity: 0 }, 
                    { y: "45vh", opacity: 1, ease: "power1.out", duration: 0.1 }, start);
                
                // 上移
                tl.to(card, 
                    { y: "-10vh", ease: "none", duration: 0.2 }, start + 0.1);
                
                // 淡出 (最後一張卡片剛好在 1.25 結束)
                tl.to(card, 
                    { opacity: 0, ease: "power1.in", duration: 0.1 }, start + 0.3);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
