<style>
    /* --- Design-Studio Ver 2 (建議方向：拱門路徑) --- */
    .studio-bg-v2 {
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        z-index: -1;
        /* 背景：深邃的墨綠色大理石質感 */
        background: radial-gradient(circle, #2d5a52 0%, #1a332f 100%);
        overflow: hidden;
    }

    /* 模擬圖片 2：通往遠方的儀式拱門 */
    .archway {
        position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
        width: 1px; height: 100vh;
        background: rgba(178, 148, 94, 0.2); /* 金箔色導引線 */
        animation: archFadeIn 2s ease-out;
    }
    
    /* 錯落、深遠的拱門結構感 */
    .archway::after {
        content: ""; position: absolute; bottom: 20vh; left: -150px;
        width: 300px; height: 400px;
        border: 1px solid rgba(178, 148, 94, 0.1);
        background: linear-gradient(180deg, transparent 50%, rgba(255, 255, 255, 0.05));
    }

    /* 3D 視窗預留：深色毛玻璃，更突顯立體字母光影 */
    .studio-viewport-v2 {
        position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
        width: 85%; max-width: 900px; height: 75%;
        background: rgba(13, 26, 24, 0.5); /* 深色毛玻璃背景 */
        backdrop-filter: blur(25px); /* 更深的霧化效果 */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 50px 120px rgba(0,0,0,0.3);
        display: flex; align-items: center; justify-content: center;
        color: var(--gold-leaf); font-weight: 200; letter-spacing: 5px;
    }

    @keyframes archFadeIn { from { height: 0; } to { height: 100vh; } }
</style>

<div class="studio-bg-v2">
    <div class="archway"></div>
    
    <div class="studio-viewport-v2">
        <span style="font-family: Montserrat;">譜寫作品</span>
    </div>
</div>
